<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品管理</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 完整的CSS样式保持不变，确保包含以下关键样式 */
        :root {
            --primary-color: #4f46e5;
            --secondary-color: #6b7280;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --info-color: #3b82f6;
        }

        body {
            background: #c5dcff;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        /* 侧边栏相关样式 */
        .sidebar {
            background: #4155c6;
            color: white;
            height: 100vh;
            position: fixed;
            width: 280px;
            left: 0;
            top: 0;
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 25px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
        }

        .sidebar-menu {
            padding: 20px 0;
        }

        .nav-item {
            margin: 5px 15px;
        }

        .nav-link {
            color: #cbd5e1;
            padding: 12px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            transform: translateX(5px);
        }

        .nav-link i {
            width: 24px;
            font-size: 18px;
        }

        /* 主内容区样式 */
        .main-content {
            margin-left: 280px;
            padding: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* 其他样式保持不变... */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .goods-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #e5e7eb;
        }

        .goods-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        /* 审核状态标签样式 */
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .pending { background: #fef3c7; color: #92400e; }
        .approved { background: #d1fae5; color: #065f46; }
        .rejected { background: #fee2e2; color: #991b1b; }

        .price-tag {
            background: linear-gradient(45deg, #10b981, #3b82f6);
            color: white;
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 18px;
            display: inline-block;
        }

        .category-badge {
            background: #e0e7ff;
            color: #4f46e5;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .action-btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-approve { background: var(--success-color); color: white; }
        .btn-reject { background: var(--danger-color); color: white; }

        .btn-approve:hover { opacity: 0.9; transform: scale(1.05); }
        .btn-reject:hover { opacity: 0.9; transform: scale(1.05); }

        .stats-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .stats-number {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary-color);
        }

        .stats-label {
            color: var(--secondary-color);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .search-box {
            background: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .filter-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .reject-reason {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
<!--引用侧边栏片段 -->
<div th:replace="admin/sidebar :: sidebar(currentPage='goods-manage')"></div>

<!-- 主内容区 -->
<div class="main-content">
    <!-- 顶部标题栏 -->
    <div class="header">
        <div class="page-title">
            <i class="fas fa-shopping-bag"></i>
            <span>商品审核管理</span>
        </div>
    </div>

    <!-- 消息提示 -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-check-circle me-2"></i>
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-circle me-2"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- 状态统计 -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="stats-card">
                <div class="stats-number" th:text="${totalCount}">0</div>
                <div class="stats-label">总商品数</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stats-card">
                <div class="stats-number" th:text="${pendingCount}">0</div>
                <div class="stats-label">待审核</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stats-card">
                <div class="stats-number" th:text="${approvedCount}">0</div>
                <div class="stats-label">已通过</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stats-card">
                <div class="stats-number" th:text="${rejectedCount}">0</div>
                <div class="stats-label">已拒绝</div>
            </div>
        </div>
    </div>

    <!-- 筛选区域 -->
    <div class="filter-section mb-4">
        <div class="row">
            <!-- 审核状态筛选 -->
            <div class="col-md-12 mb-3">
                <div class="btn-group status-filter" role="group">
                    <a href="/admin/web/goods-manage?status=all"
                       class="btn btn-outline-primary"
                       th:classappend="${activeStatus == 'all'} ? 'active'">全部</a>
                    <a href="/admin/web/goods-manage?status=pending"
                       class="btn btn-outline-warning"
                       th:classappend="${activeStatus == 'pending'} ? 'active'">待审核</a>
                    <a href="/admin/web/goods-manage?status=approved"
                       class="btn btn-outline-success"
                       th:classappend="${activeStatus == 'approved'} ? 'active'">已通过</a>
                    <a href="/admin/web/goods-manage?status=rejected"
                       class="btn btn-outline-danger"
                       th:classappend="${activeStatus == 'rejected'} ? 'active'">已拒绝</a>
                </div>
            </div>

            <!-- 分类筛选 -->
            <div class="col-md-4 mb-3">
                <form method="get" class="d-flex">
                    <select name="classify" class="form-select" onchange="this.form.submit()">
                        <option value="">所有分类</option>
                        <option th:each="category : ${classifyList}"
                                th:value="${category}"
                                th:text="${category}"
                                th:selected="${selectedClassify == category}">
                        </option>
                    </select>
                    <input type="hidden" name="status" th:value="${activeStatus}">
                </form>
            </div>

            <!-- 发布者搜索 -->
            <div class="col-md-4 mb-3">
                <form method="get" class="d-flex">
                    <input type="text" name="owner" class="form-control"
                           placeholder="发布者账号"
                           th:value="${selectedOwner}">
                    <button class="btn btn-outline-secondary ms-2" type="submit">搜索</button>
                    <input type="hidden" name="status" th:value="${activeStatus}">
                </form>
            </div>

            <!-- 关键词搜索 -->
            <div class="col-md-4 mb-3">
                <form method="get" class="d-flex">
                    <input type="text" name="keyword" class="form-control"
                           placeholder="搜索商品内容"
                           th:value="${searchKeyword}">
                    <button class="btn btn-primary ms-2" type="submit">搜索</button>
                    <input type="hidden" name="status" th:value="${activeStatus}">
                </form>
            </div>
        </div>
    </div>

    <!-- 商品列表 -->
    <div class="row">
        <div th:each="goods : ${goodsList}" class="col-md-4 mb-4">
            <div class="goods-card">
                <!-- 商品状态标签 -->
                <div class="mb-3">
                    <span th:if="${goods.auditStatus == 'pending'}" class="status-badge pending">
                        <i class="fas fa-clock me-1"></i>待审核
                    </span>
                    <span th:if="${goods.auditStatus == 'approved'}" class="status-badge approved">
                        <i class="fas fa-check me-1"></i>已通过
                    </span>
                    <span th:if="${goods.auditStatus == 'rejected'}" class="status-badge rejected">
                        <i class="fas fa-times me-1"></i>已拒绝
                    </span>
                </div>

                <!-- 商品信息 -->
                <h5 class="fw-bold mb-2" th:text="${#strings.abbreviate(goods.content, 20)}"></h5>
                <p class="text-muted mb-3" style="font-size: 14px;"
                   th:text="${#strings.abbreviate(goods.content, 100)}"></p>

                <!-- 价格信息 -->
                <div class="mb-3">
                    <div class="price-tag d-inline-block me-2">
                        ¥<span th:text="${goods.money}"></span>
                    </div>
                    <span class="category-badge" th:text="${goods.classify}"></span>
                </div>

                <!-- 发布者信息 -->
                <div class="mb-3">
                    <small class="text-muted">
                        <i class="fas fa-user me-1"></i>
                        发布者: <span th:text="${goods.owner?.account ?: '未知'}"></span>
                    </small>
                </div>

                <!-- 拒绝理由 -->
                <div th:if="${goods.auditStatus == 'rejected'}">
                    <!-- 先检查是否为null，再检查是否为空 -->
                    <div th:if="${goods.rejectReason != null}">
                        <div th:if="${not #strings.isEmpty(goods.rejectReason)}"
                             class="reject-reason mb-3">
                            <strong>拒绝理由：</strong>
                            <span th:text="${goods.rejectReason}"></span>
                        </div>
                    </div>
                </div>

                <!-- 时间信息 -->
                <div class="mb-3">
                    <small class="text-muted">
                        <i class="far fa-clock me-1"></i>
                        发布时间: <span th:text="${#dates.format(goods.editDate, 'yyyy-MM-dd HH:mm')}"></span>
                    </small>
                </div>

                <!-- 操作按钮 -->
                <div class="d-flex flex-wrap gap-2">
                    <!-- 审核操作按钮 -->
                    <div th:if="${goods.auditStatus == 'pending'}" class="d-flex gap-2 w-100">
                        <a th:href="@{/admin/web/goods/approve(hash=${goods.hash})}"
                           class="btn btn-approve action-btn flex-grow-1"
                           onclick="return confirm('确定要通过该商品审核吗？')">
                            <i class="fas fa-check me-1"></i>通过
                        </a>
                        <button class="btn btn-reject action-btn flex-grow-1"
                                data-bs-toggle="modal"
                                data-bs-target="#rejectModal"
                                th:data-bs-goods-hash="${goods.hash}"
                                th:data-bs-goods-content="${#strings.abbreviate(goods.content, 50)}">
                            <i class="fas fa-times me-1"></i>拒绝
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- 无数据提示 -->
    <div th:if="${#lists.isEmpty(goodsList)}" class="text-center py-5 glass-card">
        <i class="fas fa-box-open fa-3x text-muted mb-3"></i>
        <h4 class="text-muted">暂无商品数据</h4>
        <p class="text-muted">还没有商品发布或数据为空</p>
    </div>
</div>

<!-- 拒绝商品模态框 -->
<div class="modal fade" id="rejectModal" tabindex="-1" aria-labelledby="rejectModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/admin/web/goods/reject}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title" id="rejectModalLabel">拒绝商品</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>商品：<span id="goodsContent" class="fw-bold"></span></p>
                    <input type="hidden" id="goodsHash" name="hash">
                    <div class="mb-3">
                        <label for="rejectReason" class="form-label">拒绝理由 <span class="text-danger">*</span></label>
                        <textarea class="form-control" id="rejectReason" name="reason"
                                  rows="4" placeholder="请填写拒绝理由（至少10个字）..."
                                  minlength="10" required></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-danger">确认拒绝</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // 拒绝模态框处理
    const rejectModal = document.getElementById('rejectModal');
    if (rejectModal) {
        rejectModal.addEventListener('show.bs.modal', function(event) {
            const button = event.relatedTarget;
            const goodsHash = button.getAttribute('data-bs-goods-hash');
            const goodsContent = button.getAttribute('data-bs-goods-content');

            document.getElementById('goodsHash').value = goodsHash;
            document.getElementById('goodsContent').textContent = goodsContent;
        });
    }

</script>
</body>
</html>
